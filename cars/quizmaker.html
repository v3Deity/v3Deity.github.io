<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- favicon -->
  <link rel="icon" href="favicon.png" type="image/x-icon">

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Mono&display=swap" rel="stylesheet">

  <title>Car Quiz Maker</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #searchBox {
      flex: 1;
      font-family: inherit;
      color: white;
      background: #1f1f22;
      border-radius: 4px;
      border: 3px solid #000000;
    }

    #dropdown {
      border: 3px solid #000000;
      max-height: 150px;
      overflow-y: auto;
      display: none;
      background: #1f1f22;
      color: white;
      position: absolute;
      width: calc(100% - 20px);
      z-index: 5;
      border-radius: 4px;
    }

    #dropdown div {
      padding: 4px 6px;
      cursor: pointer;
    }

    #dropdown div:hover {
      background: #414147;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 4px 6px;
      text-align: left;
    }
  </style>
</head>

<body>

  <!--navbar-->
  <header class="navbar">
    <a href="https://3deity.space" class="navbar-icon">
      <img src="navbar-icon.png" alt="Home">
    </a>

    <nav class="navbar-links">
      <a href="https://3deity.space/cars">Home</a>
      <span class="divider">|</span>
      <a href="random">Random Car</a>
      <span class="divider">|</span>
      <a href="quiz">Car Quiz</a>
      <span class="divider">|</span>
      <a href="quizmaker">Quiz Maker</a>
      <span class="divider">|</span>
      <a href="dream">Dream Garage</a>
    </nav>
  </header>

  <div class="content-box" style="padding-bottom: 100px">
    <h1>Deity's Car Quiz Maker</h1>
    <hr>

    <div class="button-container">
      <button id="downloadQuizButton">Download Quiz</button>
      <button id="copyQuizButton">Copy Quiz JSON</button>
      <a href="https://3deity.space/cars/quiz">
        <button>Back to Quiz</button>
      </a>
    </div>

    <hr>

    <!-- Search -->
    <div style="position: relative;">
      <div class="search-row">
        <input id="searchBox" placeholder="Search car brand or model...">
        <div class="button-container">
          <button id="addAllBtn">Load All</button>
          <button id="excludeAllBtn">Clear List</button>
        </div>
      </div>
      <div id="dropdown"></div>
    </div>

    <p>
      Showing
      <input id="showCount" value="10" style="width:50px">
      /
      <span id="totalCount">0</span>
      results
    </p>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Car</th>
        </tr>
      </thead>
      <tbody id="carTable"></tbody>
    </table>
  </div>

<script>
/* ================= CONFIG ================= */
const CAR_LIST_URL = "/data/car_models.json"; // ← change ONLY if needed
const DEFAULT_SHOW = 10;

/* ================= STATE ================= */
let allCars = [];
let selectedCars = [];
let showLimit = DEFAULT_SHOW;

/* ================= LOAD DATA ================= */
fetch(CAR_LIST_URL)
  .then(r => r.json())
  .then(data => {
    allCars = data.sort();
    renderDropdown();
    updateTable();
  });

/* ================= SEARCH ================= */
const searchBox = document.getElementById("searchBox");
const dropdown = document.getElementById("dropdown");

searchBox.addEventListener("input", renderDropdown);
searchBox.addEventListener("focus", renderDropdown);

searchBox.addEventListener("blur", () => {
  // Delay so clicks on dropdown items still register
  setTimeout(() => {
    dropdown.style.display = "none";
  }, 150);
});

// Normalise a search term: lowercase and treat spaces as underscores
// so "Ford GT40" matches "Ford_GT40" in the car list.
function normaliseQuery(str) {
  return str.toLowerCase().replace(/ /g, "_");
}

// Returns cars matching the query, starts-with results first, then contains.
function getMatches(query) {
  if (!query) return [];
  const q = normaliseQuery(query);
  const starts = allCars.filter(c => c.toLowerCase().startsWith(q));
  const contains = allCars.filter(c =>
    !c.toLowerCase().startsWith(q) && c.toLowerCase().includes(q)
  );
  return [...starts, ...contains];
}

function updateButtonLabels() {
  const hasQuery = searchBox.value.trim().length > 0;
  document.getElementById("addAllBtn").textContent    = hasQuery ? "Include" : "Load All";
  document.getElementById("excludeAllBtn").textContent = hasQuery ? "Exclude" : "Clear List";
}

function renderDropdown() {
  updateButtonLabels();

  // Only show dropdown if search box is focused
  if (document.activeElement !== searchBox) {
    dropdown.style.display = "none";
    return;
  }

  const value = searchBox.value;
  dropdown.innerHTML = "";

  if (!value) {
    dropdown.style.display = "none";
    return;
  }

  const matches = getMatches(value);

  matches.forEach(car => {
    const div = document.createElement("div");
    div.textContent = car;

    // Prevent blur before click fires
    div.addEventListener("mousedown", e => e.preventDefault());

    div.onclick = () => {
      addCars([car]);
      dropdown.style.display = "none";
    };

    dropdown.appendChild(div);
  });

  dropdown.style.display = matches.length ? "block" : "none";
}


/* ================= ADD / EXCLUDE ================= */
document.getElementById("addAllBtn").onclick = () => {
  const val = searchBox.value;
  const cars = val ? getMatches(val) : allCars;
  addCars(cars);
};

document.getElementById("excludeAllBtn").onclick = () => {
  const val = searchBox.value;
  if (!val) return;
  const toRemove = new Set(getMatches(val));
  selectedCars = selectedCars.filter(c => !toRemove.has(c));
  updateTable();
};

function addCars(cars) {
  cars.forEach(c => {
    if (!selectedCars.includes(c)) selectedCars.push(c);
  });
  selectedCars.sort();
  updateTable();
}

/* ================= TABLE ================= */
function updateTable() {
  const tbody = document.getElementById("carTable");
  tbody.innerHTML = "";

  document.getElementById("totalCount").textContent = selectedCars.length;

  selectedCars.slice(0, showLimit).forEach((car, i) => {
    const row = tbody.insertRow();
    row.insertCell().textContent = i + 1;
    row.insertCell().textContent = car;
  });
}

/* ================= SHOW LIMIT ================= */
const showInput = document.getElementById("showCount");
showInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const n = parseInt(showInput.value);
    showLimit = isNaN(n) || n <= 0 ? DEFAULT_SHOW : n;
    showInput.value = showLimit;
    updateTable();
  }
});

/* ================= EXPORT ================= */
function getQuizJSON() {
  return JSON.stringify(selectedCars, null, 2);
}

document.getElementById("copyQuizButton").onclick = () => {
  navigator.clipboard.writeText(getQuizJSON());
};

document.getElementById("downloadQuizButton").onclick = () => {
  const blob = new Blob([getQuizJSON()], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "car_quiz.json";
  a.click();
};
</script>

</body>
</html>
